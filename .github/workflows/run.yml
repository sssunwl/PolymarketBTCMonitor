name: Run Tracker

on:
  schedule:
    - cron: "* * * * *"   # 每分鐘
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 取得 repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Python 環境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ 安裝 Playwright（關鍵）
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install

      # 4️⃣ 跑基本 tracker（round）
      - name: Run tracker
        run: python tracker.py

      # 5️⃣ 抓價格（核心）
      - name: Run price tracker
        run: python price_tracker.py

      # 6️⃣ Commit（不會炸）
      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"

          git add . || true
          git commit -m "update data" || true

      # 7️⃣ Push（防 500 error）
      - name: Push (safe)
        run: |
          git pull --rebase || true
          git push || true
